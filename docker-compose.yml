version: "3.8"

services:
  mysql:
    image: mysql:8.0
    command: --default-time-zone=+08:00
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-xianyu_root_123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-xianyu}
      MYSQL_USER: ${MYSQL_USER:-xianyu}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-xianyu_pass_123}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # 开启 AOF 持久化：消息队列（stream:messages）落盘，Redis 重启/部署不丢未消费的买家消息。
    # everysec：最多丢 ~1s 写入，对本场景足够（上游闲鱼消息不会重投，目标是扛住常规重启）。
    command: redis-server --requirepass ${REDIS_PASSWORD:-xianyu_redis_123} --appendonly yes --appendfsync everysec
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-xianyu_redis_123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-web:
    build: ./backend-web
    ports:
      - "8089:8089"
    env_file: .env
    environment:
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - WEBSOCKET_SERVICE_URL=http://websocket:8090
      - TZ=Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./common:/app/common
      - ./websocket/prompts:/app/websocket/prompts
    networks:
      - internal

  websocket:
    build: ./websocket
    ports:
      - "8090:8090"
    env_file: .env
    environment:
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - TZ=Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./common:/app/common
      - ./websocket/prompts:/app/prompts
    networks:
      - internal

  frontend:
    build: ./frontend
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "80:80"
    depends_on:
      - backend-web
    networks:
      - internal

networks:
  internal:

volumes:
  mysql_data:
  redis_data:
